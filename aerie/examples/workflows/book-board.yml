description: |-
  Takes a single social media post about books and updates a leaderboard of genres/themes.

  Demonstrates use of reranking tools for prioritizing search results both textually and semantically for titles and summaries, respectively.


  Requires tools:
  - examples/tools/nix/openlibrary-oas.mcp
  - examples/tools/nix/reranker.mcp
