      CommentNode:
        comment: |-
          The official Qdrant MCP server is fairly basic and lacks a way to configure deduplication. Each time this is run, an additional copy of each paragraph is inserted.

          You can create a custom MCP server fairly easily or configure point identity externally. You would also need to generate IDs from the text, however.
